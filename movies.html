<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎬 Movies</title>

<style>
body{
background:#eef4f2;
font-family:Segoe UI,sans-serif;
padding:20px;
}

.header{
background:#b8e4d9;
padding:25px;
border-radius:20px;
margin-bottom:20px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
}

button{
padding:12px 20px;
background:#9fd9cd;
border:none;
border-radius:10px;
cursor:pointer;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="header">
<h1>🎬 Movies</h1>
</div>

<input type="date" id="date">
<input placeholder="Movie Name" id="name">

<button onclick="addMovie()">Add Movie</button>

<div id="list"></div>

<script>

function addMovie(){

const date=document.getElementById("date").value;
const name=document.getElementById("name").value;

if(!date || !name) return;

let data=
JSON.parse(localStorage.getItem("movies")||"[]");

data.unshift({
date,
name
});

localStorage.setItem(
"movies",
JSON.stringify(data)
);

loadMovies();

document.getElementById("date").value="";
document.getElementById("name").value="";
}

function loadMovies(){

let data=
JSON.parse(localStorage.getItem("movies")||"[]");

document.getElementById("list").innerHTML=
data.map(x=>`
<div class="card">
<b>${x.name}</b><br>
${x.date}
</div>
`).join("");
}

loadMovies();

</script>

</body>
</html>
