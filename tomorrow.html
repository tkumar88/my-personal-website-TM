<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📅 Tomorrow</title>

<style>
body{background:#eef4f2;font-family:Segoe UI;padding:20px;}
.header{background:#b8e4d9;padding:25px;border-radius:20px;text-align:center;margin-bottom:20px;}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px;}
button{padding:12px 20px;background:#9fd9cd;border:none;border-radius:10px;}
.card{background:white;padding:15px;border-radius:15px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">
<h1>📅 Tomorrow</h1>
</div>

<input type="date" id="date">
<input placeholder="Task" id="name">

<button onclick="addTask()">Add Task</button>

<div id="list"></div>

<script>
function addTask(){
const date=document.getElementById("date").value;
const name=document.getElementById("name").value;

if(!date || !name) return;

let data=JSON.parse(localStorage.getItem("tomorrow")||"[]");

data.unshift({date,name});

localStorage.setItem("tomorrow",JSON.stringify(data));

loadTasks();

document.getElementById("date").value="";
document.getElementById("name").value="";
}

function loadTasks(){
let data=JSON.parse(localStorage.getItem("tomorrow")||"[]");

document.getElementById("list").innerHTML=
data.map(x=>`
<div class="card">
<b>${x.name}</b><br>
${x.date}
</div>`).join("");
}

loadTasks();
</script>

</body>
</html>
