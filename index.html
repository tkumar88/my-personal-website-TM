<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Memory Vault</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.header{
text-align:center;
padding:30px 0;
}

.header h1{
font-size:3rem;
}

.header p{
color:#94a3b8;
margin-top:10px;
}

.memories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin:30px 0;
}

.memory-card{
background:#1e293b;
border-radius:24px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.3);
transition:.3s;
}

.memory-card:hover{
transform:translateY(-8px);
}

.memory-card img{
width:100%;
height:220px;
object-fit:cover;
}

.memory-content{
padding:20px;
}

.memory-content h3{
font-size:24px;
margin-bottom:10px;
}

.memory-content span{
color:#94a3b8;
font-size:14px;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:30px;
}

.cat{
padding:25px;
border-radius:20px;
cursor:pointer;
text-align:center;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.cat:hover{
transform:scale(1.05);
}

.movies{background:#ef4444;}
.trips{background:#3b82f6;}
.food{background:#ec4899;}
.expenses{background:#f59e0b;}
.notes{background:#64748b;}
.tasks{background:#22c55e;}

.panel{
background:white;
color:black;
margin-top:30px;
padding:25px;
border-radius:25px;
display:none;
}

.panel input,
.panel textarea{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:12px;
}

.panel button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
}

.entry{
background:#f8fafc;
padding:15px;
border-radius:15px;
margin-top:15px;
}

.entry img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
<h1>📸 My Memory Vault</h1>
<p>Store Trips, Movies, Food, Notes and Life Memories</p>
</div>

<div class="memories">

<div class="memory-card">
/400?random=1">
<div class="memory-content">
<h3>✈️ Chicago Trip</h3>
<span>June 2026</span>
</div>
</div>

<div class="memory-card">
=2">
<div class="memory-content">
<h3>🎬 Interstellar</h3>
<span>★★★★★</span>
</div>
</div>

<div class="memory-card">
https://picsum.photos/600/400?random=3
<div class="memory-content">
<h3>🍕 Favorite Pizza</h3>
<span>Memorable Food</span>
</div>
</div>

</div>

<div class="categories">

<div class="cat movies" onclick="openCat('Movies')">🎬 Movies</div>
<div class="cat trips" onclick="openCat('Trips')">✈️ Trips</div>
<div class="cat food" onclick="openCat('Food')">🍕 Food</div>
<div class="cat expenses" onclick="openCat('Expenses')">💰 Expenses</div>
<div class="cat notes" onclick="openCat('Notes')">📝 Notes</div>
<div class="cat tasks" onclick="openCat('Tasks')">✅ Tasks</div>

</div>

<div id="panel" class="panel">

<h2 id="title"></h2>

<input id="name" placeholder="Memory Title">

<input id="photo" placeholder="Photo URL">

<textarea id="notes" rows="4" placeholder="Write your memory..."></textarea>

<button onclick="saveMemory()">Save Memory</button>

<div id="entries"></div>

</div>

<script>

function openCat(name){
document.getElementById("panel").style.display="block";
document.getElementById("title").innerText=name;
}

function saveMemory(){

let title=document.getElementById("name").value;
let photo=document.getElementById("photo").value;
let notes=document.getElementById("notes").value;

let html=`
<div class="entry">
${photo ? `${photo}` : ""}
<h3>${title}</h3>
<p>${notes}</p>
</div>
`;

document.getElementById("entries").innerHTML += html;

document.getElementById("name").value="";
document.getElementById("photo").value="";
document.getElementById("notes").value="";
}
</script>

</body>
</html>
