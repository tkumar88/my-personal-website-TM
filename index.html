<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>My Life Dashboard</title>
<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff}
.header{text-align:center;padding:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;max-width:1200px;margin:auto}
.card{padding:25px;border-radius:20px;cursor:pointer;transition:.3s;color:#fff;font-weight:700}
.card:hover{transform:translateY(-5px)}
.movies{background:#ef4444}.trips{background:#3b82f6}.todo{background:#22c55e}.expenses{background:#f59e0b}.groceries{background:#14b8a6}.food{background:#ec4899}.tomorrow{background:#8b5cf6}.notes{background:#64748b}
#section{max-width:900px;margin:20px auto;background:#fff;color:#111;padding:20px;border-radius:20px;display:none}
input{width:75%;padding:10px}button{padding:10px 15px}.item{padding:10px;border-bottom:1px solid #ddd}
</style>
</head>
<body>
<div class='header'>
<h1>🏠 My Life Dashboard</h1>
<p>Click a category and save items in your browser.</p>
</div>
<div class='grid'>
<div class='card movies' onclick="openCat('Movies Watched')">🎬 Movies</div>
<div class='card trips' onclick="openCat('Trips')">✈️ Trips</div>
<div class='card todo' onclick="openCat('To Do')">✅ To Do</div>
<div class='card expenses' onclick="openCat('Money Spent')">💰 Expenses</div>
<div class='card groceries' onclick="openCat('Groceries')">🛒 Groceries</div>
<div class='card food' onclick="openCat('What To Eat')">🍕 Food</div>
<div class='card tomorrow' onclick="openCat('Tomorrow Plan')">📅 Tomorrow</div>
<div class='card notes' onclick="openCat('Notes')">📝 Notes</div>
</div>
<div id='section'>
<h2 id='title'></h2><br>
<input id='txt' placeholder='Add an item'>
<button onclick='addItem()'>Add</button>
<div id='list'></div>
</div>
<script>
let current='';
function openCat(cat){current=cat;document.getElementById('section').style.display='block';document.getElementById('title').innerText=cat;loadItems();}
function addItem(){let v=document.getElementById('txt').value;if(!v)return;let a=JSON.parse(localStorage.getItem(current)||'[]');a.push(v);localStorage.setItem(current,JSON.stringify(a));document.getElementById('txt').value='';loadItems();}
function loadItems(){let a=JSON.parse(localStorage.getItem(current)||'[]');document.getElementById('list').innerHTML=a.map(x=>'<div class="item">'+x+'</div>').join('');}
</script>
</body>
</html>
