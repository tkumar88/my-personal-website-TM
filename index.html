<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:30px;
}

.header{
max-width:1200px;
margin:auto;
margin-bottom:30px;
}

.hero{
background:linear-gradient(135deg,#2563eb,#7c3aed);
padding:40px;
border-radius:30px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:.9;
}

.grid{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:24px;
cursor:pointer;
transition:.3s;
border:1px solid #334155;
}

.card:hover{
transform:translateY(-5px);
background:#263548;
}

.icon{
font-size:40px;
margin-bottom:15px;
}

.card h3{
font-size:24px;
margin-bottom:8px;
}

.card p{
color:#94a3b8;
}

.section{
max-width:1200px;
margin:25px auto;
background:white;
color:black;
border-radius:24px;
padding:25px;
display:none;
}

.section h2{
margin-bottom:15px;
}

.input-row{
display:flex;
gap:10px;
margin-bottom:15px;
}

input{
flex:1;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

.item{
background:#f1f5f9;
padding:15px;
margin-top:10px;
border-radius:12px;
}
</style>
</head>
<body>

<div class="header">

<div class="hero">
<h1>🏠 My Life Hub</h1>
<p>Everything in one place</p>
</div>

</div>

<div class="grid">

<div class="card" onclick="openSection('Movies')">
<div class="icon">🎬</div>
<h3>Movies</h3>
<p>Movies I've watched</p>
</div>

<div class="card" onclick="openSection('Trips')">
<div class="icon">✈️</div>
<h3>Trips</h3>
<p>Places I've visited</p>
</div>

<div class="card" onclick="openSection('Expenses')">
<div class="icon">💰</div>
<h3>Expenses</h3>
<p>Money spent</p>
</div>

<div class="card" onclick="openSection('Groceries')">
<div class="icon">🛒</div>
<h3>Groceries</h3>
<p>Shopping history</p>
</div>

<div class="card" onclick="openSection('Food')">
<div class="icon">🍕</div>
<h3>Food</h3>
<p>Things to eat</p>
</div>

<div class="card" onclick="openSection('Tomorrow')">
<div class="icon">📅</div>
<h3>Tomorrow</h3>
<p>Plan next day</p>
</div>

<div class="card" onclick="openSection('Notes')">
<div class="icon">📝</div>
<h3>Notes</h3>
<p>Ideas & thoughts</p>
</div>

<div class="card" onclick="openSection('Goals')">
<div class="icon">✅</div>
<h3>Goals</h3>
<p>Things to achieve</p>
</div>

</div>

<div id="section" class="section">

<h2 id="title"></h2>

<div class="input-row">
<input id="text" placeholder="Add item...">
<button onclick="addItem()">Add</button>
</div>

<div id="list"></div>

</div>

<script>

let current='';

function openSection(name){
current=name;
document.getElementById('section').style.display='block';
document.getElementById('title').innerText=name;
}

function addItem(){

const value=document.getElementById('text').value;

if(!value) return;

document.getElementById('list').innerHTML +=
`<div class="item">${value}</div>`;

document.getElementById('text').value='';
}

</script>

</body>
</html>
