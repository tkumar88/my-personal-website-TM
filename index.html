<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🍃 My Life OS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef4f2;
padding:25px;
color:#333;
}

.hero{
background:rgba(184,228,217,.8);
backdrop-filter:blur(15px);
padding:40px;
border-radius:30px;
text-align:center;
margin-bottom:30px;
}

.hero h1{
font-size:55px;
}

.hero p{
margin-top:10px;
color:#666;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
max-width:1400px;
margin:auto;
}

.card{
background:white;
border-radius:24px;
padding:25px;
border-top:8px solid #9fd9cd;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card h3{
font-size:30px;
margin-top:10px;
}

.icon{
font-size:40px;
}

.panel{
margin-top:15px;
display:none;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:12px;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#9fd9cd;
font-weight:bold;
cursor:pointer;
}

.entry{
margin-top:10px;
padding:12px;
background:#f7fbfa;
border-left:4px solid #9fd9cd;
border-radius:10px;
}

.activity{
max-width:1400px;
margin:30px auto;
background:white;
padding:20px;
border-radius:24px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.activity h2{
margin-bottom:15px;
}

.activityItem{
padding:12px;
border-bottom:1px solid #eee;
}
</style>
</head>
<body>

<div class="hero">
<h1>🍃 My Life OS</h1>
<p>Capture • Organize • Remember</p>
</div>

<div class="grid">

<div class="card">
<div class="icon">🎬</div>
<h3>Movies</h3>
<p>Movies I've watched</p>

<div class="panel" id="movies">
<input type="date" id="moviesDate">
<input placeholder="Movie Name" id="moviesText">
<button onclick="addItem('movies')">Add Movie</button>
<div id="moviesList"></div>
</div>

<button onclick="togglePanel('movies')">Open</button>
</div>

<div class="card">
<div class="icon">✈️</div>
<h3>Trips</h3>

<div class="panel" id="trips">
<input type="date" id="tripsDate">
<input placeholder="Trip Name" id="tripsText">
<button onclick="addItem('trips')">Add Trip</button>
<div id="tripsList"></div>
</div>

<button onclick="togglePanel('trips')">Open</button>
</div>

<div class="card">
<div class="icon">💰</div>
<h3>Expenses</h3>

<div class="panel" id="expenses">
<input type="date" id="expensesDate">
<input placeholder="Expense" id="expensesText">
<button onclick="addItem('expenses')">Add Expense</button>
<div id="expensesList"></div>
</div>

<button onclick="togglePanel('expenses')">Open</button>
</div>

<div class="card">
<div class="icon">🛒</div>
<h3>Groceries</h3>

<div class="panel" id="groceries">
<input type="date" id="groceriesDate">
<input placeholder="Grocery Item" id="groceriesText">
<button onclick="addItem('groceries')">Add Grocery</button>
<div id="groceriesList"></div>
</div>

<button onclick="togglePanel('groceries')">Open</button>
</div>

<div class="card">
<div class="icon">🍕</div>
<h3>Food</h3>

<div class="panel" id="food">
<input type="date" id="foodDate">
<input placeholder="Food Item" id="foodText">
<button onclick="addItem('food')">Add Food</button>
<div id="foodList"></div>
</div>

<button onclick="togglePanel('food')">Open</button>
</div>

<div class="card">
<div class="icon">🏏</div>
<h3>Cricket</h3>

<div class="panel" id="cricket">
<input type="date" id="cricketDate">
<input placeholder="Match / Practice" id="cricketText">
<button onclick="addItem('cricket')">Add Cricket</button>
<div id="cricketList"></div>
</div>

<button onclick="togglePanel('cricket')">Open</button>
</div>

<div class="card">
<div class="icon">📝</div>
<h3>Notes</h3>

<div class="panel" id="notes">
<input type="date" id="notesDate">
<input placeholder="Note" id="notesText">
<button onclick="addItem('notes')">Add Note</button>
<div id="notesList"></div>
</div>

<button onclick="togglePanel('notes')">Open</button>
</div>

<div class="card">
<div class="icon">✅</div>
<h3>Goals</h3>

<div class="panel" id="goals">
<input type="date" id="goalsDate">
<input placeholder="Goal" id="goalsText">
<button onclick="addItem('goals')">Add Goal</button>
<div id="goalsList"></div>
</div>

<button onclick="togglePanel('goals')">Open</button>
</div>

<div class="card">
<div class="icon">📅</div>
<h3>Tomorrow</h3>

<div class="panel" id="tomorrow">
<input type="date" id="tomorrowDate">
<input placeholder="Task" id="tomorrowText">
<button onclick="addItem('tomorrow')">Add Task</button>
<div id="tomorrowList"></div>
</div>

<button onclick="togglePanel('tomorrow')">Open</button>
</div>

</div>

<div class="activity">
<h2>🌿 Recent Activity</h2>
<div id="activityFeed"></div>
</div>

<script>

function togglePanel(id){
const panel=document.getElementById(id);
panel.style.display=
panel.style.display==="block" ? "none" : "block";
}

function addItem(category){

const date=document.getElementById(category+'Date').value;
const text=document.getElementById(category+'Text').value;

if(!date || !text){
alert("Fill both fields");
return;
}

let data=
JSON.parse(localStorage.getItem(category) || "[]");

data.unshift({
date:text ? date : '',
text:text
});

localStorage.setItem(
category,
JSON.stringify(data)
);

document.getElementById(category+'Text').value='';

loadItems(category);
loadActivity();
}

function loadItems(category){

const list=document.getElementById(category+'List');

if(!list) return;

const data=
JSON.parse(localStorage.getItem(category) || "[]");

list.innerHTML='';

data.forEach(item=>{

list.innerHTML += `
<div class="entry">
<strong>${item.text}</strong><br>
${item.date}
</div>
`;

});
}

function loadActivity(){

const feed=document.getElementById('activityFeed');

feed.innerHTML='';

[
'movies','trips','expenses',
'groceries','food','cricket',
'notes','goals','tomorrow'
].forEach(cat=>{

let data=
JSON.parse(localStorage.getItem(cat) || "[]");

if(data.length){

feed.innerHTML += `
<div class="activityItem">
${data[0].text}
<br>
<small>${data[0].date}</small>
</div>
`;

}

});
}

window.onload=function(){

[
'movies','trips','expenses',
'groceries','food','cricket',
'notes','goals','tomorrow'
].forEach(loadItems);

loadActivity();

}
</script>

</body>
</html>
