<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Templates</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5}
.container{display:flex;height:100vh}
.sidebar{
 width:260px;
 background:#fff;
 border-right:1px solid #ddd;
 padding:20px;
 overflow:auto;
}
.sidebar h3{color:#f4a23a;margin-bottom:20px}
.menu-item{
 padding:12px;
 border-radius:10px;
 margin-bottom:8px;
 cursor:pointer;
}
.menu-item:hover,.active{
 background:#fff3df;
 color:#f4a23a;
}
.content{
 flex:1;
 padding:40px;
}
.content h1{
 font-size:48px;
 margin-bottom:40px;
}
.cards{
 display:flex;
 gap:30px;
 flex-wrap:wrap;
}
.card{
 width:220px;
}
.card-preview{
 height:300px;
 background:#fff;
 border-radius:12px;
 box-shadow:0 2px 10px rgba(0,0,0,.1);
 display:flex;
 align-items:center;
 justify-content:center;
 font-weight:bold;
}
.selected .card-preview{
 border:4px solid orange;
}
.card-title{
 text-align:center;
 margin-top:10px;
 font-size:18px;
}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h3>All Templates</h3>
    <div class="menu-item">Recents</div>
    <div class="menu-item">Basic</div>
    <div class="menu-item">Premium</div>
    <div class="menu-item">Reports</div>
    <div class="menu-item">Education</div>
    <div class="menu-item">Certificates</div>
    <div class="menu-item">Business</div>
    <div class="menu-item">Books</div>
    <div class="menu-item">Cards</div>
    <div class="menu-item active">My Templates</div>
  </div>

  <div class="content">
    <h1>My Templates</h1>

    <div class="cards">
      <div class="card selected">
        <div class="card-preview">Template 1</div>
        <div class="card-title">Template Name</div>
      </div>

      <div class="card">
        <div class="card-preview" style="background:#f3dd72">Template 2</div>
        <div class="card-title">Press Kit</div>
      </div>

      <div class="card">
        <div class="card-preview">Template 3</div>
        <div class="card-title">Letter Template</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
