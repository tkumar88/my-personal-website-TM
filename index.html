<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🌿 Life Journal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#edf5f3;
padding:25px;
color:#444;
}

.hero{
max-width:1200px;
margin:auto;
padding:35px;
text-align:center;

background:rgba(189,231,223,.7);
backdrop-filter:blur(20px);

border-radius:30px;
border:1px solid rgba(255,255,255,.4);
}

.hero h1{
font-size:50px;
}

.hero p{
margin-top:10px;
color:#666;
}

.grid{
max-width:1200px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.65);
backdrop-filter:blur(16px);

border-radius:24px;
padding:25px;

cursor:pointer;

box-shadow:0 8px 20px rgba(0,0,0,.06);

transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:40px;
margin-bottom:10px;
}

.card h3{
font-size:28px;
}

.card p{
margin-top:8px;
color:#666;
}

.panel{
display:none;

margin-top:20px;

background:white;
border-radius:20px;

padding:20px;
}

.panel input{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:12px;
}

.panel button{
background:#b9e5dd;
border:none;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.entry{
margin-top:12px;
padding:15px;
background:#f5fafa;
border-left:4px solid #9fd9cd;
border-radius:12px;
}

.date{
font-size:13px;
color:#888;
margin-bottom:5px;
}

</style>
</head>

<body>

<div class="hero">
<h1>🌿 Life Journal</h1>
<p>Your personal timeline</p>
</div>

<div class="grid">

<div>

<div class="card" onclick="togglePanel('movies')">
<div class="icon">🎬</div>
<h3>Movies</h3>
<p>Movies I've watched</p>
</div>

<div class="panel" id="movies">

<input type="date">

<input placeholder="Movie Name">

<button>Add Movie</button>

<div class="entry">
<div class="date">2026-07-04</div>
Interstellar ⭐⭐⭐⭐⭐
</div>

<div class="entry">
<div class="date">2026-07-01</div>
Top Gun Maverick
</div>

</div>

</div>

<div>

<div class="card" onclick="togglePanel('trips')">
<div class="icon">✈️</div>
<h3>Trips</h3>
<p>Travel memories</p>
</div>

<div class="panel" id="trips">

<input type="date">

<input placeholder="Trip Name">

<button>Add Trip</button>

</div>

</div>

<div>

<div class="card" onclick="togglePanel('expenses')">
<div class="icon">💰</div>
<h3>Expenses</h3>
<p>Money tracker</p>
</div>

<div class="panel" id="expenses">

<input type="date">

<input placeholder="Description">

<input placeholder="Amount">

<button>Add Expense</button>

</div>

</div>

<div>

<div class="card" onclick="togglePanel('notes')">
<div class="icon">📝</div>
<h3>Notes</h3>
<p>Ideas & thoughts</p>
</div>

<div class="panel" id="notes">

<input type="date">

<input placeholder="Note">

<button>Add Note</button>

</div>

</div>

</div>

<script>

function togglePanel(id){

document
.querySelectorAll('.panel')
.forEach(p=>{

if(p.id!==id)
p.style.display='none';

});

const panel=document.getElementById(id);

panel.style.display=
panel.style.display==='block'
?'none'
:'block';

}

</script>

</body>
</html>
