<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Life Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    max-width:1000px;
    margin:30px auto;
}

.card{
    padding:30px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.movies{background:#ef4444;}
.trips{background:#3b82f6;}
.expenses{background:#f59e0b;}
.groceries{background:#10b981;}
.food{background:#ec4899;}
.notes{background:#64748b;}

#content{
    max-width:800px;
    margin:auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:20px;
    display:none;
}

input{
    width:75%;
    padding:10px;
}

button{
    padding:10px;
}

.item{
    padding:10px;
    margin-top:10px;
    background:#f1f5f9;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>🏠 My Life Dashboard</h1>

<div class="grid">

<div class="card movies" onclick="openCat('Movies')">
🎬 Movies
</div>

<div class="card trips" onclick="openCat('Trips')">
✈️ Trips
</div>

<div class="card expenses" onclick="openCat('Expenses')">
💰 Expenses
</div>

<div class="card groceries" onclick="openCat('Groceries')">
🛒 Groceries
</div>

<div class="card food" onclick="openCat('Food')">
🍕 Food
</div>

<div class="card notes" onclick="openCat('Notes')">
📝 Notes
</div>

</div>

<div id="content">
    <h2 id="title"></h2>

    <input id="txt" placeholder="Type something...">
    <button onclick="addItem()">Add</button>

    <div id="list"></div>
</div>

<script>

let current='';

function openCat(cat){
    current=cat;
    document.getElementById('content').style.display='block';
    document.getElementById('title').innerText=cat;
}

function addItem(){

    let text=document.getElementById('txt').value;

    if(text==='') return;

    let div=document.createElement('div');

    div.className='item';
    div.innerText=text;

    document.getElementById('list').appendChild(div);

    document.getElementById('txt').value='';
}

</script>

</body>
</html>
